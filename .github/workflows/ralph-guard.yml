name: Ralph Guard — .gnosiq/ integrity check

on:
  pull_request:
    branches: [main, develop]

jobs:
  ralph-guard:
    name: Validate .gnosiq/ context
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check .gnosiq/ exists
        run: |
          if [ ! -d ".gnosiq" ]; then
            echo "❌ [RALPH] .gnosiq/ ausente — PR rejeitado"
            exit 1
          fi
          echo "✓ .gnosiq/ presente"

      - name: Check required files
        run: |
          for f in agents.md ssot-ref.md ralph-loop.sh current-task.md; do
            if [ ! -f ".gnosiq/$f" ]; then
              echo "❌ [RALPH] .gnosiq/$f ausente"
              exit 1
            fi
          done
          echo "✓ Todos os 4 arquivos presentes"

      - name: Check ssot-ref.md version
        run: |
          VERSION=$(grep -oP '(?<=version: )[\d.]+' .gnosiq/ssot-ref.md | head -1)
          if [ -z "$VERSION" ]; then
            echo "❌ [RALPH] versão não detectada em ssot-ref.md"
            exit 1
          fi
          echo "✓ SSOT v$VERSION detectado"
